server {
    listen 80;
    server_name daiag3.le-campus.eu;

    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name daiag3.le-campus.eu;

    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/daiag3.le-campus.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daiag3.le-campus.eu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Le backend (Spring Security) pose déjà X-Frame-Options, X-Content-Type-Options,
        # X-XSS-Protection et Content-Security-Policy sur ses propres réponses.
        # Ajouter un add_header dans cette location réinitialise l'héritage des add_header
        # du bloc server : on ne réaffirme donc ici que ce que nginx seul gère (HSTS,
        # Referrer-Policy), pour éviter les en-têtes dupliqués sur /api/.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
