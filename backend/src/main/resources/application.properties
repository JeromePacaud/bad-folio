# Database
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:3306/${DB_NAME:devfolio}
spring.datasource.username=${DB_USER}
# A02-05 : plus de mot de passe par défaut, DB_PASSWORD est obligatoire (échec au démarrage si absent)
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# 🔴 DEV-10 : toutes les requêtes SQL loggées
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
# A02-03 : plus de secret par défaut, JWT_SECRET est obligatoire (échec au démarrage si absent)
jwt.secret=${JWT_SECRET}
jwt.expiration=0

# Actuator
# 🔴 A05-01 / A05-02 : tous les endpoints actuator exposés
management.endpoints.web.exposure.include=*
management.endpoint.env.enabled=true
management.endpoint.heapdump.enabled=true
management.endpoint.shutdown.enabled=true
management.security.enabled=false

# Error handling
# 🔴 DEV-11 : stacktrace exposée dans les réponses d'erreur
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
# 🔴 A05-06 : niveau DEBUG en configuration production
logging.level.root=DEBUG
logging.level.com.devfolio=DEBUG
# 🔴 A09-04 : log sans rotation configurée
logging.file.name=logs/devfolio.log
