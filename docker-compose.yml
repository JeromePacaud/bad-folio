version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    # 🔴 DEV-03 : port 3306 exposé sur 0.0.0.0 (accessible depuis Internet)
    ports:
      - "0.0.0.0:3309:3306"
    environment:
      # 🔴 DEV-04 : mot de passe root trivial
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devfolio
      # 🔴 DEV-04 : pas de compte applicatif séparé
    volumes:
      # 🔴 DEV-06 : bind mount sans restriction
      - ./database:/docker-entrypoint-initdb.d
      - ./mariadb-data:/var/lib/mysql
    # Pas de healthcheck
    # Pas de réseau isolé

  backend:
    build: ./backend
    # 🔴 : pas de depends_on avec condition healthy
    depends_on:
      - mariadb
    ports:
      - "8081:8080"
    # Secrets (DB_HOST/DB_USER/DB_PASSWORD/JWT_SECRET, etc.) fournis via .env, non versionné
    env_file:
      - .env
    environment:
      # 🔴 A05-06 : debug activé
      DEBUG: "true"
    # 🔴 DEV-05 : pas de network déclaré, utilise le réseau bridge par défaut

  frontend:
    build: ./frontend
    ports:
      - "81:80"
    depends_on:
      - backend
    # 🔴 : HTTP seulement, pas de redirection HTTPS

# 🔴 DEV-05 : pas de section 'networks' — isolation réseau absente
