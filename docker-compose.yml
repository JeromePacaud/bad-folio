services:
  mariadb:
    image: mariadb:10.11
    # 🔴 DEV-03 : port 3306 exposé sur 0.0.0.0 (accessible depuis Internet)
    # CORRIGÉ DEV-03 : port supprimé, MariaDB accessible uniquement via le réseau interne
    environment:
      # CORRIGÉ DEV-04 : compte applicatif créé automatiquement par l'image MariaDB
      # via MYSQL_USER/MYSQL_PASSWORD/MYSQL_DATABASE — pas besoin de CREATE USER dans init.sql
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: devfolio
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      # 🔴 DEV-06 : bind mount sans restriction
      - ./database:/docker-entrypoint-initdb.d
      - ./mariadb-data:/var/lib/mysql
    # Pas de healthcheck
    # 🔴 DEV-05 : pas de réseau isolé
    # CORRIGÉ DEV-05 : réseau interne isolé
    networks:
      - backend-net
    # cap_drop ALL puis cap_add des seules capabilities nécessaires à MariaDB :
    # CHOWN/SETUID/SETGID : l'entrypoint change de propriétaire et bascule vers
    # l'utilisateur mysql au démarrage — sans elles le conteneur crashe immédiatement.
    # DAC_OVERRIDE/FOWNER : accès aux fichiers de données lors de l'init.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true

  backend:
    build: ./backend
    # 🔴 : pas de depends_on avec condition healthy
    depends_on:
      - mariadb
    # Port hôte retiré : le frontend (nginx) proxy déjà /api/ → backend:8080
    # via le réseau Docker frontend-net. Exposer 8081 donnerait accès direct
    # à l'API depuis Internet, contournant le proxy et le pare-feu.
    env_file:
      - .env
    environment:
      # 🔴 DEV-07 : secrets en dur dans docker-compose (dupliqués du .env)
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/devfolio
      # 🔴 DEV-04 : connexion en root à la base
      # CORRIGÉ DEV-04 : compte applicatif au lieu de root
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      # 🔴 : secret faible mais doit faire >= 256 bits (32 caractères) pour HMAC-SHA256
      JWT_SECRET: ${JWT_SECRET}
      DEVFOLIO_ADMIN_PASSWORD: ${DEVFOLIO_ADMIN_PASSWORD}

      # 🔴 A05-06 : debug activé
      # CORRIGÉ A05-06 : DEBUG retiré
    # 🔴 DEV-05 : pas de network déclaré, utilise le réseau bridge par défaut
    # CORRIGÉ DEV-05 : connecté aux deux réseaux pour communiquer avec mariadb et frontend
    networks:
      - backend-net
      - frontend-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  frontend:
    build: ./frontend
    # CORRIGÉ : port 81:80 → 80:80
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Webroot partagé avec le conteneur certbot ponctuel pour le challenge ACME HTTP-01
      - ./certbot-www:/var/www/certbot:ro
      # Certificats Let's Encrypt obtenus par le conteneur certbot ponctuel (lecture seule)
      - ./certbot-conf:/etc/letsencrypt:ro
      # Fichier de mots de passe pour l'authentification HTTP Basique (non versionné)
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - backend
    # nginx a besoin de CHOWN/SETUID/SETGID pour initialiser /var/cache/nginx
    # et de NET_BIND_SERVICE pour écouter sur les ports 80/443 (< 1024)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend-net

# 🔴 DEV-05 : pas de section 'networks' — isolation réseau absente
# CORRIGÉ DEV-05 : deux réseaux isolés — backend-net et frontend-net
networks:
  backend-net:
    # internal: true — MariaDB et backend ne peuvent pas initier de connexions
    # sortantes vers Internet (défense en profondeur : un conteneur compromis
    # ne peut pas exfiltrer de données ou télécharger un payload)
    internal: true
  frontend-net:
    driver: bridge